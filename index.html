<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Q&A Creator</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--primary:#6c63ff;
--bg:#f4f6fb;
}

body{
font-family:Poppins;
background:var(--bg);
padding:20px;
margin:0;
}

.container{
max-width:1000px;
margin:auto;
}

.card{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:14px;
box-shadow:0 8px 20px rgba(0,0,0,0.08);
position:relative;
overflow:hidden;
}

.title{
font-weight:600;
color:var(--primary);
margin-bottom:10px;
}

input, textarea{
width:100%;
max-width:100%;
padding:12px;
margin-top:8px;
border-radius:8px;
border:1px solid #ddd;
font-family:Poppins;
box-sizing:border-box;
resize:vertical;
}

textarea{
min-height:90px;
}

button{
padding:8px 14px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.add-btn{background:var(--primary);color:white;}
.submit-btn{background:#28a745;color:white;}
.download-btn{background:#ff5722;color:white;}
.json-btn{background:#009688;color:white;}

.cancel-btn{
position:absolute;
top:12px;
right:12px;
background:red;
color:white;
border-radius:50%;
font-size:9px;
}

pre{
background:#1e1e1e;
color:#00ff88;
padding:12px;
border-radius:8px;
white-space:pre-wrap;
}

.answer-text{
white-space:pre-wrap;
}

.upload-area{
margin-bottom:25px;
display:flex;
align-items:center;
gap:10px;
}

.upload-btn{
background:linear-gradient(135deg,#6c63ff,#8f88ff);
color:white;
padding:10px 18px;
border-radius:10px;
cursor:pointer;
font-weight:500;
transition:0.3s;
}

.upload-btn:hover{
transform:scale(1.05);
}

#jsonUpload{
display:none;
}

</style>

</head>

<body>

<div class="container">

<h2>Q&A Creator</h2>

<div class="upload-area">

<label for="jsonUpload" class="upload-btn">
⬆ Upload JSON
</label>

<input type="file" id="jsonUpload" accept=".json">

</div>

<div id="groups"></div>

<button class="add-btn" onclick="addGroup()">+ Add Question</button>
<button class="submit-btn" onclick="submitData()">Submit</button>

<h2>Submitted Q&A</h2>

<div id="output"></div>

<button class="download-btn" onclick="downloadPDF()">Download PDF</button>
<button class="json-btn" onclick="downloadJSON()">Download JSON</button>

</div>

<script>

let questionCount=0
let finalData=[]

function saveDraft(){

const cards=document.querySelectorAll("#groups .card")

let draft=[]

cards.forEach(card=>{

const inputs=card.querySelectorAll("input,textarea")

draft.push({
question:inputs[0].value,
answer:inputs[1].value,
code:inputs[2].value
})

})

localStorage.setItem("qaDraft",JSON.stringify(draft))

}

function addGroup(data={}){

questionCount++

const group=document.createElement("div")
group.className="card"

group.innerHTML=`

<button class="cancel-btn">✖</button>

<div class="title">Question ${questionCount}</div>

<input type="text" placeholder="Enter Question" value="${data.question||''}">

<textarea placeholder="Enter Answer">${data.answer||''}</textarea>

<textarea placeholder="Enter Example Code">${data.code||''}</textarea>

`

group.querySelector(".cancel-btn").onclick=()=>{
group.remove()
updateTitles()
saveDraft()
}

group.querySelectorAll("input,textarea").forEach(el=>{
el.addEventListener("input",saveDraft)
})

document.getElementById("groups").appendChild(group)

}

function updateTitles(){

const cards=document.querySelectorAll("#groups .card")

questionCount=0

cards.forEach(card=>{
questionCount++
card.querySelector(".title").textContent="Question "+questionCount
})

}

document.getElementById("jsonUpload").addEventListener("change",function(e){

const file=e.target.files[0]
if(!file)return

const reader=new FileReader()

reader.onload=function(event){

const data=JSON.parse(event.target.result)

document.getElementById("groups").innerHTML=""
questionCount=0

data.forEach(item=>{
addGroup(item)
})

saveDraft()

}

reader.readAsText(file)

})

function submitData(){

const cards=document.querySelectorAll("#groups .card")

finalData=[]

cards.forEach((card,index)=>{

const inputs=card.querySelectorAll("input,textarea")

const question=inputs[0].value.trim()
const answer=inputs[1].value
const code=inputs[2].value.trim()

if(question!=""){

let obj={
number:index+1,
question:question,
answer:answer
}

if(code!=""){
obj.code=code
}

finalData.push(obj)

}

})

displayResults()

}

function displayResults(){

const output=document.getElementById("output")
output.innerHTML=""

finalData.forEach(item=>{

const card=document.createElement("div")
card.className="card"

const title=document.createElement("div")
title.className="title"
title.textContent=item.number+". "+item.question

const ans=document.createElement("div")
ans.className="answer-text"
ans.textContent=item.answer

card.appendChild(title)
card.appendChild(ans)

if(item.code){

const pre=document.createElement("pre")
pre.textContent=item.code
card.appendChild(pre)

}

output.appendChild(card)

})

}

function downloadJSON(){

const blob=new Blob([JSON.stringify(finalData,null,2)],{type:"application/json"})

const url=URL.createObjectURL(blob)

const a=document.createElement("a")

a.href=url
a.download="qa-data.json"
a.click()

}

async function downloadPDF(){

const {jsPDF}=window.jspdf

const element=document.getElementById("output")

const canvas=await html2canvas(element,{scale:2})

const img=canvas.toDataURL("image/png")

const pdf=new jsPDF("p","mm","a4")

const imgWidth=190
const imgHeight=(canvas.height*imgWidth)/canvas.width

pdf.addImage(img,"PNG",10,10,imgWidth,imgHeight)

pdf.save("qa.pdf")

}

window.onload=function(){

const saved=localStorage.getItem("qaDraft")

if(saved){

const draft=JSON.parse(saved)

draft.forEach(item=>{
addGroup(item)
})

}else{

addGroup()

}

}

</script>

</body>

</html>
